<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="icon" type="image/gif" href="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" />
<title>Crack Tap</title>
<style>
  :root {
    --bg: #07060c;
    --ink: #f5efe2;           /* warm ivory */
    --accent: #d8c08a;        /* single soft gold for rare emphasis */
    --serif: "Cormorant Garamond", "Iowan Old Style", "Hoefler Text", Georgia, "Times New Roman",
             "Source Han Serif SC", "Noto Serif CJK SC", "Songti SC", "Source Han Serif TC",
             "Noto Serif CJK TC", "Songti TC", STSong, SimSun, serif;
  }
  * {
    box-sizing: border-box; -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
  }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--serif);
    font-weight: 400;
    overflow: hidden; user-select: none; touch-action: none;
    overscroll-behavior: none;
  }
  body { overflow: hidden; position: relative; }
  #stage {
    position: absolute; inset: 0; display: block;
    width: 100%; height: 100%; background: var(--bg);
  }
  .hud {
    position: absolute; left: 0; right: 0; top: 0;
    text-align: center; pointer-events: none;
    padding-top: env(safe-area-inset-top);
  }
  .hud .label {
    margin-top: 24px; font-size: 10px; letter-spacing: 0.42em;
    color: rgba(245,239,226,0.42); text-transform: uppercase;
    font-weight: 500;
  }
  .hud .counter {
    margin-top: 2px; font-size: 48px; font-weight: 500; line-height: 1.02;
    color: var(--ink); letter-spacing: -0.005em;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "lnum", "tnum";
  }
  .hud .combo {
    margin-top: 6px; font-size: 11px; font-weight: 500;
    letter-spacing: 0.38em; color: var(--accent);
    text-transform: uppercase;
    opacity: 0; transition: opacity 0.25s ease;
  }
  .hud .combo.show { opacity: 1; }
  .hud .hint {
    margin-top: 14px; font-size: 16px; font-style: italic;
    color: rgba(245,239,226,0.32);
    animation: ct-pulse 3.4s ease-in-out infinite;
  }
  .hud .hint.hidden { opacity: 0; animation: none; transition: opacity 0.6s ease; }
  .hud .fever {
    display: none;
    margin-top: 12px; font-size: 11px; font-weight: 500;
    color: var(--accent); letter-spacing: 0.42em;
    text-transform: uppercase;
    animation: ct-pulse 1.4s ease-in-out infinite;
  }
  .hud .fever.show { display: block; }
  @keyframes ct-pulse {
    0%, 100% { opacity: 0.55; }
    50%      { opacity: 1; }
  }
  .credits {
    position: absolute; left: 0; right: 0; bottom: 12px;
    text-align: center; color: rgba(245,239,226,0.18);
    font-size: 11px; letter-spacing: 0.34em; text-transform: uppercase;
    font-weight: 500;
    pointer-events: none; padding-bottom: env(safe-area-inset-bottom);
  }

  /* leaderboard icon button */
  .lb-icon-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid rgba(216,192,138,0.28);
    background: rgba(216,192,138,0.06); color: var(--accent);
    font-size: 17px; line-height: 1; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.08s;
  }
  .lb-icon-btn:active { background: rgba(216,192,138,0.16); transform: scale(0.9); }
  .lb-hud {
    position: absolute; left: 14px; top: 14px;
    padding-top: calc(env(safe-area-inset-top));
    z-index: 10;
  }

  /* leaderboard overlay */
  #lb-overlay {
    position: fixed; inset: 0; z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease;
  }
  #lb-overlay.show { opacity: 1; pointer-events: all; }
  #lb-panel {
    width: 100%; max-width: 360px; max-height: 82vh;
    display: flex; flex-direction: column;
    border-radius: 18px;
    background: linear-gradient(160deg, rgba(20,16,12,0.96) 0%, rgba(8,7,5,0.98) 100%);
    border: 1px solid rgba(216,192,138,0.14);
    box-shadow: 0 24px 64px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
    overflow: hidden;
    animation: lb-enter 0.32s cubic-bezier(0.34,1.4,0.64,1) both;
    font-family: inherit;
  }
  #lb-overlay:not(.show) #lb-panel { animation: none; }
  .lb-hdr {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 20px 14px;
    border-bottom: 1px solid rgba(216,192,138,0.08);
    flex-shrink: 0;
  }
  .lb-hdr-left { display: flex; align-items: center; gap: 10px; }
  .lb-hdr-icon { font-size: 20px; opacity: 0.85; }
  .lb-hdr-title {
    font-size: 11px; font-weight: 500; color: var(--accent);
    letter-spacing: 0.42em; text-transform: uppercase;
  }
  .lb-hdr-game { font-size: 13px; color: rgba(245,239,226,0.45); margin-top: 2px; font-style: italic; }
  .lb-close {
    width: 30px; height: 30px; border-radius: 50%; border: none;
    background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.55);
    font-size: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent; flex-shrink: 0;
    transition: background 0.15s;
  }
  .lb-close:active { background: rgba(255,255,255,0.18); transform: scale(0.9); }
  .lb-tabs { display: flex; gap: 6px; padding: 12px 14px 0; flex-shrink: 0; }
  .lb-tab {
    flex: 1; padding: 9px 8px; border: 1px solid transparent; border-radius: 10px;
    font-size: 11px; font-weight: 500; cursor: pointer;
    background: rgba(245,239,226,0.04); color: rgba(245,239,226,0.5);
    font-family: inherit; letter-spacing: 0.32em; text-transform: uppercase;
    -webkit-tap-highlight-color: transparent; transition: background 0.2s, color 0.2s;
  }
  .lb-tab.active {
    background: rgba(216,192,138,0.10);
    color: var(--accent); border-color: rgba(216,192,138,0.22);
  }
  .lb-body { flex: 1; overflow-y: auto; padding: 10px 12px 16px; -webkit-overflow-scrolling: touch; }
  .lb-body::-webkit-scrollbar { display: none; }
  .lb-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 12px; padding: 40px 20px;
  }
  .lb-state-icon { font-size: 32px; }
  .lb-state-text { font-size: 13px; color: rgba(255,255,255,0.4); text-align: center; line-height: 1.5; letter-spacing: 0.08em; }
  .lb-spinner {
    display: block; width: 26px; height: 26px; border-radius: 50%;
    border: 2px solid rgba(216,192,138,0.18); border-top-color: var(--accent);
    animation: lb-spin 0.8s linear infinite;
  }
  .lb-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 10px; margin-bottom: 4px;
    background: rgba(245,239,226,0.03);
  }
  .lb-row.top { background: rgba(216,192,138,0.06); border: 1px solid rgba(216,192,138,0.10); }
  .lb-row.me  { background: rgba(216,192,138,0.14); border: 1px solid rgba(216,192,138,0.32); }
  .lb-row.clickable { cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .lb-row.clickable:active { background: rgba(216,192,138,0.16); transform: scale(0.98); }
  .lb-rank { width: 28px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .lb-medal { font-size: 20px; line-height: 1; }
  .lb-num { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.35); font-variant-numeric: tabular-nums; }
  .lb-avatar {
    border-radius: 50%; overflow: hidden; flex-shrink: 0;
    background: linear-gradient(135deg, #2a2418, #100c06);
    display: flex; align-items: center; justify-content: center;
    font-weight: 500; color: var(--accent);
    border: 1px solid rgba(216,192,138,0.22);
  }
  .lb-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .lb-info { flex: 1; min-width: 0; display: flex; align-items: center; gap: 6px; overflow: hidden; }
  .lb-name { font-size: 15px; font-weight: 500; color: rgba(245,239,226,0.94); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lb-me-tag {
    font-size: 9px; font-weight: 500; color: var(--accent);
    background: rgba(216,192,138,0.12); border-radius: 4px;
    padding: 1px 6px; flex-shrink: 0; letter-spacing: 0.2em; text-transform: uppercase;
  }
  .lb-score {
    font-size: 17px; font-weight: 500; color: var(--accent);
    font-variant-numeric: tabular-nums; flex-shrink: 0;
  }
  .lb-num { font-size: 13px; font-weight: 500; color: rgba(245,239,226,0.32); font-variant-numeric: tabular-nums; }
  @keyframes lb-enter {
    from { opacity: 0; transform: translateY(20px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes lb-spin { to { transform: rotate(360deg); } }

  /* ── Fortune card (the reading reveal) ──────────────────────────────────
     Hierarchy by size & weight, not colour. Single typeface. Monochrome ivory
     with one warm-ivory shift for rare; muted slate for dire. */
  .reading {
    position: absolute; left: 0; right: 0; bottom: 0;
    padding: 28px 28px calc(42px + env(safe-area-inset-bottom));
    text-align: center; pointer-events: none;
    opacity: 0; transform: translateY(22px);
    transition: opacity .6s ease, transform .6s cubic-bezier(.22,1,.36,1);
  }
  .reading.show { opacity: 1; transform: translateY(0); }
  .reading .eyebrow {
    font-size: 10px; letter-spacing: .46em; text-transform: uppercase;
    color: rgba(245,239,226,.34); margin-bottom: 14px;
    font-weight: 500;
  }
  .reading .verdict {
    font-size: 54px; font-weight: 500; line-height: 1.02;
    color: var(--ink); margin: 0;
    letter-spacing: -0.012em;
  }
  .reading .line {
    font-size: 19px; font-style: italic; line-height: 1.45;
    color: rgba(245,239,226,.6); max-width: 320px; margin: 14px auto 0;
    font-weight: 400;
  }
  .reading.rare .verdict { color: #f3e6c4; }
  .reading.rare .eyebrow { color: rgba(243,230,196,.55); }
  .reading.dire .verdict { color: #a89c95; }
  .reading.dire .line    { color: rgba(168,156,149,.6); }
</style>
</head>
<body>
  <canvas id="stage"></canvas>

  <div class="hud">
    <div class="label" id="label">Fortune</div>
    <div class="counter" id="counter">0</div>
    <div class="combo" id="combo">TRUE SIGHT ×1</div>
    <div class="hint" id="hint">Hold to read · release before it shatters</div>
    <div class="fever" id="fever">TRANCE</div>
  </div>

  <div class="lb-hud">
    <button class="lb-icon-btn" id="hudLbBtn" aria-label="Leaderboard">🏆</button>
  </div>

  <div id="lb-overlay">
    <div id="lb-panel">
      <div class="lb-hdr">
        <div class="lb-hdr-left">
          <span class="lb-hdr-icon">🏆</span>
          <div>
            <div class="lb-hdr-title" id="lb-title-text">Leaderboard</div>
            <div class="lb-hdr-game">Crack Tap</div>
          </div>
        </div>
        <button class="lb-close" id="lb-close-btn">✕</button>
      </div>
      <div class="lb-tabs" id="lb-tabs" style="display:none">
        <button class="lb-tab active" id="lb-tab-global">🌍 Global</button>
        <button class="lb-tab" id="lb-tab-friends">👥 Friends</button>
      </div>
      <div class="lb-body" id="lb-body">
        <div class="lb-state"><span class="lb-spinner"></span></div>
      </div>
    </div>
  </div>

  <div class="reading" id="reading">
    <div class="eyebrow" id="rdEyebrow"></div>
    <div class="verdict" id="rdVerdict">—</div>
    <div class="line" id="rdLine"></div>
  </div>

  <div class="credits" id="credits">Read the cracks</div>

<script>
(() => {
  'use strict';

  // ----- Themes --------------------------------------------------------------
  // Each theme is a material: crystal (amethyst glass), ceramic (terracotta
  // pot), geode (obsidian shell over a molten core). They drive palette, the
  // crack glow, shard colors, and the shatter SFX flavour.
  const THEMES = {
    crystal: {
      bg: '#060713', accent: '#9b6bff',
      objA: '#9a78ff', objB: '#2c1d57', rim: '#d8c6ff',
      hi: '#3a2a72', lo: '#170f30',
      groove: '#140a30', edge: '#f3ecff', molten: false, glow: 9,
      core: '#c7a4ff', spec: 'rgba(255,255,255,0.95)', specR: 0.32, specSoft: false,
      shards: ['#8c63f0', '#6b47d0', '#a988ff', '#5436a8', '#cdb6ff'],
      tex: 'facet', root: 261.63, sfx: 'glass',
    },
    ceramic: {
      bg: '#140d09', accent: '#e9a06b',
      objA: '#e7a368', objB: '#7c4527', rim: '#ffe2c0',
      hi: '#f3c79a', lo: '#5a3017',
      groove: '#3a1f0f', edge: '#ffe0bb', molten: false, glow: 3,
      core: '#ffcf9a', spec: 'rgba(255,240,225,0.5)', specR: 0.5, specSoft: true,
      shards: ['#d98a52', '#b06736', '#e8a86e', '#8a4f2c', '#f0c89a'],
      tex: 'speckle', root: 220.00, sfx: 'clay',
    },
    geode: {
      bg: '#0a0705', accent: '#ff7a2b',
      objA: '#36302a', objB: '#0c0a08', rim: '#6a4a32',
      hi: '#4a4038', lo: '#070605',
      groove: '#140a04', edge: '#ffc55a', molten: true, glow: 16,
      core: '#ffd24a', spec: 'rgba(255,210,150,0.85)', specR: 0.26, specSoft: false,
      shards: ['#2b2622', '#1a1714', '#3a322c', '#ff7a2b', '#ffb14a'],
      tex: 'mottle', root: 196.00, sfx: 'rock',
    },
  };

  // ----- i18n (auto zh/en) ---------------------------------------------------
  // localStorage override > navigator.language. Test: localStorage.setItem(
  // 'game_locale','en' | 'zh'); location.reload().
  const LANG = (() => {
    const ov = localStorage.getItem('game_locale');
    if (ov === 'en' || ov === 'zh') return ov;
    return (navigator.language || 'en').toLowerCase().startsWith('zh') ? 'zh' : 'en';
  })();
  const L = (s) => (s && typeof s === 'object') ? (s[LANG] || s.en) : s;

  const UI = {
    fortune:   { en: 'Fortune',     zh: '命数' },
    trueSight: { en: 'TRUE SIGHT',  zh: '通灵' },
    trance:    { en: 'TRANCE',      zh: '入定' },
    hint:      { en: 'Hold to read · release before it shatters',
                 zh: '按住读纹 · 临界之前松手' },
    credits:   { en: 'READ THE CRACKS', zh: '观纹问卜' },
    shatteredGlory: { en: 'Shattered Glory', zh: '碎中之辉' },
    shattered:      { en: 'Shattered',       zh: '凶碎' },
    shatteredOf:    { en: ' · Shattered',    zh: ' · 碎' },
  };

  // ----- Divination lore -----------------------------------------------------
  // Each material is a reading tradition. The crack pattern at the moment you
  // release IS the omen; the deeper you dared, the rarer the tier it can draw.
  // Verdicts & lines are bilingual; render via L().
  const LORE = {
    crystal: { name: { en: 'The Arcana', zh: '塔罗' }, tiers: {
      whisper: [
        { v: { en: 'The Fool',         zh: '愚者' },
          l: { en: 'A first step into open air. Nothing decided, everything possible.',
               zh: '一步迈入旷野。未定之事，皆是可能。' }},
        { v: { en: 'The Page',         zh: '侍者' },
          l: { en: 'Small news travels toward you. Listen for the knock.',
               zh: '微讯将至。候那一声轻叩。' }},
        { v: { en: 'Two of Cups',      zh: '圣杯二' },
          l: { en: 'Two streams find the same valley.',
               zh: '两脉清流，归于同谷。' }},
        { v: { en: 'The Hermit',       zh: '隐士' },
          l: { en: 'The lamp is small but it is yours. Walk slow.',
               zh: '灯虽微小，却为你而执。慢行。' }},
        { v: { en: 'Wheel, turning',   zh: '命运之轮' },
          l: { en: 'What rose will set; what set will rise again.',
               zh: '升者必落，落者复升。' }},
        { v: { en: 'Six of Wands',     zh: '权杖六' },
          l: { en: 'A quiet victory no one else has noticed yet.',
               zh: '无声捷报，尚无人察。' }},
      ],
      vision: [
        { v: { en: 'The Lovers',       zh: '恋人' },
          l: { en: 'A choice that is really a vow. Choose with the whole hand.',
               zh: '看似抉择，实为誓盟。落子要尽力。' }},
        { v: { en: 'The Chariot',      zh: '战车' },
          l: { en: 'Two horses, opposite minds — and still you arrive.',
               zh: '两驾分心，犹能抵岸。' }},
        { v: { en: 'Strength',         zh: '力量' },
          l: { en: 'The lion did not leave. You simply stopped flinching.',
               zh: '狮未去，是你不再退避。' }},
        { v: { en: 'The Star',         zh: '星' },
          l: { en: 'After the dark water, a light that asks nothing back.',
               zh: '渡过暗水，有一束不索求的光。' }},
        { v: { en: 'Justice',          zh: '正义' },
          l: { en: 'The scale remembers what you have forgotten.',
               zh: '那杆秤，记得你已忘之事。' }},
        { v: { en: 'Temperance',       zh: '节制' },
          l: { en: 'Fire poured into water, and neither one screamed.',
               zh: '火入水中，两者皆未惊。' }},
      ],
      revelation: [
        { v: { en: 'The Sun',          zh: '太阳' },
          l: { en: 'Everything you buried is growing in full daylight.',
               zh: '你所埋的，正在白日下蔓生。' }},
        { v: { en: 'The Magician',     zh: '魔法师' },
          l: { en: 'The tools were always on the table. Now your hands agree.',
               zh: '器具早在桌上，如今手亦相应。' }},
        { v: { en: 'Death',            zh: '死神' },
          l: { en: 'Not an ending — a door with the hinges finally oiled.',
               zh: '非为终结——是终于上好油的门轴。' }},
        { v: { en: 'The World',        zh: '世界' },
          l: { en: 'The circle closes, and you are standing inside it.',
               zh: '圆环合拢，你正立其中。' }},
        { v: { en: 'The High Priestess', zh: '女祭司' },
          l: { en: 'She will not speak. She will let you become the answer.',
               zh: '她不语，只让你自成为答。' }},
      ],
      omen: [
        { v: { en: 'The Tower',        zh: '塔' },
          l: { en: 'Lightning is honest. What it takes was never yours.',
               zh: '雷霆诚实——所取从不属你。' }},
        { v: { en: 'Judgement',        zh: '审判' },
          l: { en: 'A horn over still water. The old name will not fit anymore.',
               zh: '静水之上一声号角，旧名再难合身。' }},
        { v: { en: 'The Empress, crowned', zh: '加冕的皇后' },
          l: { en: 'Abundance with your face on it. Spend it well.',
               zh: '满载之富，刻着你的脸。慎用之。' }},
        { v: { en: 'The Moon, full',   zh: '满月' },
          l: { en: 'Every shadow tonight is telling the truth in reverse.',
               zh: '今夜每道阴影，皆以反语吐实。' }},
      ],
    }},
    ceramic: { name: { en: 'The Oracle Bone', zh: '甲骨' }, tiers: {
      whisper: [
        { v: { en: 'Fair Wind',         zh: '顺风' },
          l: { en: 'The diviner reads: a small journey, no rain.',
               zh: '卜辞曰：小往，无雨。' }},
        { v: { en: 'Guest Approaching', zh: '客至' },
          l: { en: 'Set one more bowl. The crack bends toward the door.',
               zh: '兆纹向门，备一只碗。' }},
        { v: { en: 'Patience',          zh: '守时' },
          l: { en: 'The ox does not hurry and still crosses the field.',
               zh: '牛不疾，仍越其畴。' }},
        { v: { en: 'Modest Harvest',    zh: '小获' },
          l: { en: 'Enough grain to keep, not enough to boast.',
               zh: '余粮足而不夸。' }},
        { v: { en: 'Still Water',       zh: '静水' },
          l: { en: 'No omen is itself an omen. Rest.',
               zh: '无兆即兆。可息。' }},
        { v: { en: 'Mended Vessel',     zh: '修器' },
          l: { en: 'The seam holds. Pour without fear.',
               zh: '接缝守固，可斟无惧。' }},
      ],
      vision: [
        { v: { en: 'The King Hunts',    zh: '王田' },
          l: { en: 'Move at dawn. The fork in the bone points east.',
               zh: '黎明启行，兆指向东。' }},
        { v: { en: 'Ancestors Pleased', zh: '祖以歆' },
          l: { en: 'The smoke rose straight. What you asked is granted.',
               zh: '烟柱径直，所祈得允。' }},
        { v: { en: 'River Rising',      zh: '川兴' },

  // Tier definitions — labels & scores are constant; the *positions* on the
  // depth axis are randomized per orb (see spawnObject) so the player can
  // never memorise a release point.
  const TIER_KEYS = ['whisper', 'vision', 'revelation', 'omen'];
  const TIER_LABELS = {
    whisper:    { en: 'Whisper',         zh: '微兆' },
    vision:     { en: 'Vision',          zh: '显象' },
    revelation: { en: 'Revelation',      zh: '启示' },
    omen:       { en: 'Omen · Brink',    zh: '大凶 · 临界' },
  };
  const TIER_SCORES = { whisper: 6, vision: 18, revelation: 45, omen: 110 };
  const TIER_IDX = { whisper: 0, vision: 1, revelation: 2, omen: 3 };

  // Per-orb thresholds. Vision / Revelation / Brink positions wander within
  // sane ranges; brink width (1 - brink) is the rare-omen window, sometimes
  // generous, sometimes a hair-trigger.
  function rollTiers() {
    const rand = (a, b) => a + Math.random() * (b - a);
    let w = rand(0.04, 0.10);          // Whisper almost immediate
    let v = rand(0.18, 0.32);          // Vision arrives quick
    let r = rand(0.42, 0.60);          // Revelation in the middle of a comfortable hold
    let b = rand(0.70, 0.88);          // Brink window varies — sometimes hair-trigger
    v = Math.max(v, w + 0.10);
    r = Math.max(r, v + 0.12);
    b = Math.max(b, r + 0.10);
    if (b > 0.92) b = 0.92;
    return { whisper: w, vision: v, revelation: r, omen: b };
  }
  // Different orbs grow at different rates: some accelerate, some stall —
  // so even the gauge's visible speed is unpredictable.
  function rollCurve() {
    const k = Math.random();
    if (k < 0.4) return { kind: 'linear', a: 0,    b: 1.0 };
    if (k < 0.7) return { kind: 'accel',  a: 0.45, b: 1.4 };   // slow start, sudden surge
    return            { kind: 'decel',  a: 1.55, b: -0.7 };   // fast start, stalls near brink
  }
  function curveMul(curve, d) {
    return Math.max(0.25, curve.a + curve.b * d);
  }
  function tierAt(d, o) {
    const t = o.tiers;
    let key = null;
    if (d >= t.omen) key = 'omen';
    else if (d >= t.revelation) key = 'revelation';
    else if (d >= t.vision) key = 'vision';
    else if (d >= t.whisper) key = 'whisper';
    if (!key) return null;
    return { key, label: TIER_LABELS[key], score: TIER_SCORES[key], idx: TIER_IDX[key] };
  }

  // Per-object surface detail in unit-circle space (radius 1), generated once
  // so it doesn't shimmer frame-to-frame. Scaled by R at draw time.
  function makeTexture(kind) {
    const rnd = (a, b) => a + Math.random() * (b - a);
    if (kind === 'facet') {
      const lines = [], spark = [];
      for (let i = 0; i < 9; i++) {
        const a = Math.random() * Math.PI;
        const off = rnd(-0.8, 0.8);
        lines.push({ a, off, bright: Math.random() < 0.35 });
      }
      for (let i = 0; i < 13; i++) {
        const ang = Math.random() * Math.PI * 2;
        const rr = Math.sqrt(Math.random()) * 0.86;
        spark.push({ x: Math.cos(ang) * rr, y: Math.sin(ang) * rr, r: rnd(0.012, 0.03) });
      }
      return { kind, lines, spark };
    }
    if (kind === 'speckle') {
      const dots = [];
      for (let i = 0; i < 110; i++) {
        const ang = Math.random() * Math.PI * 2;
        const rr = Math.sqrt(Math.random()) * 0.95;
        dots.push({ x: Math.cos(ang) * rr, y: Math.sin(ang) * rr,
                    r: rnd(0.006, 0.022), d: Math.random() < 0.5, a: rnd(0.05, 0.16) });
      }
      return { kind, dots };
    }
    // mottle (rock)
    const blobs = [], flecks = [];
    for (let i = 0; i < 18; i++) {
      const ang = Math.random() * Math.PI * 2;
      const rr = Math.sqrt(Math.random()) * 0.9;
      blobs.push({ x: Math.cos(ang) * rr, y: Math.sin(ang) * rr, r: rnd(0.06, 0.2), a: rnd(0.12, 0.3) });
    }
    for (let i = 0; i < 10; i++) {
      const ang = Math.random() * Math.PI * 2;
      const rr = Math.sqrt(Math.random()) * 0.88;
      flecks.push({ x: Math.cos(ang) * rr, y: Math.sin(ang) * rr, r: rnd(0.015, 0.05), a: rnd(0.08, 0.2) });
    }
    return { kind, blobs, flecks };
  }

  // ----- Crack network -------------------------------------------------------
  // The FULL fracture is generated once at spawn, radiating from a single
  // impact point. Each branch carries a `revealAt` threshold (0..1): as the
  // integrity gauge fills (damage/toughness), branches spider out in order,
  // so the player literally watches the object stress and break apart. No
  // randomness at draw time → smooth, readable cause→effect.
  function buildCrackNetwork(o) {
    const R = o.r;
    const baseAng = Math.random() * Math.PI * 2;
    const ox = Math.cos(baseAng) * R * (0.05 + Math.random() * 0.18);
    const oy = Math.sin(baseAng) * R * (0.05 + Math.random() * 0.18);
    const branches = 7 + (Math.random() * 4 | 0);          // 7..10 main cracks
    o.cracks = [];
    for (let b = 0; b < branches; b++) {
      // spread roughly evenly around the impact, with jitter
      const a0 = (b / branches) * Math.PI * 2 + (Math.random() - 0.5) * 0.7;
      const segs = 4 + (Math.random() * 4 | 0);
      const crack = { pts: [{ x: ox, y: oy }], fork: [],
                      revealAt: 0, span: 0 };
      let px = ox, py = oy, a = a0;
      for (let s = 0; s < segs; s++) {
        const step = R * (0.13 + Math.random() * 0.13);
        a += (Math.random() - 0.5) * 0.34;
        if (Math.random() < 0.22) a += (Math.random() - 0.5) * 1.6;  // sharp kink
        px += Math.cos(a) * step;
        py += Math.sin(a) * step;
        const d = Math.hypot(px, py);
        if (d > R * 0.97) { const k = (R * 0.97) / d; px *= k; py *= k; }
        crack.pts.push({ x: px, y: py });
        if (s > 0 && Math.random() < 0.4) {
          let fx = px, fy = py, fa = a + (Math.random() < 0.5 ? 1 : -1) * (0.6 + Math.random() * 0.9);
          const fpts = [{ x: px, y: py }];
          const fsegs = 2 + (Math.random() * 3 | 0);
          for (let k = 0; k < fsegs; k++) {
            const fstep = R * (0.09 + Math.random() * 0.1);
            fa += (Math.random() - 0.5) * 0.4;
            fx += Math.cos(fa) * fstep; fy += Math.sin(fa) * fstep;
            const fd = Math.hypot(fx, fy);
            if (fd > R * 0.97) { const kk = (R * 0.97) / fd; fx *= kk; fy *= kk; }
            fpts.push({ x: fx, y: fy });
          }
          crack.fork.push({ pts: fpts, fr: 0.35 + Math.random() * 0.5 }); // fork starts mid-parent
        }
      }
      o.cracks.push(crack);
    }
    // stagger reveal: 2 cracks almost instant (so the first press visibly
    // bites), the rest fan out up to ~0.9 of the gauge.
    o.cracks.sort(() => Math.random() - 0.5);
    o.cracks.forEach((cr, i) => {
      cr.revealAt = i < 2 ? 0.015 : (i / o.cracks.length) * 0.88;
      cr.span = 0.1 + Math.random() * 0.14;
    });
  }

  // ----- Shard shape ---------------------------------------------------------
  // Pre-cut the disc into jagged sectors × 2 rings so a shatter looks like a
  // genuine fracture rather than a particle puff. Each shard is a polygon
  // (local coords) + its centroid offset for launch direction.
  // Voronoi fracture: scatter irregular seed points, clip the disc by the
  // perpendicular bisectors against nearby seeds → genuine shatter cells of
  // widely varying angular shape & size (not a pie/ring pattern).
  function makeShardShape() {
    const DN = 30;
    const disc = [];
    for (let i = 0; i < DN; i++) {
      const a = i / DN * Math.PI * 2;
      disc.push({ x: Math.cos(a), y: Math.sin(a) });
    }
    const seeds = [];
    const n = 15 + (Math.random() * 7 | 0);
    for (let i = 0; i < n; i++) {
      const ang = Math.random() * Math.PI * 2;
      const rr = Math.pow(Math.random(), 0.62) * 0.96;
      seeds.push({ x: Math.cos(ang) * rr, y: Math.sin(ang) * rr });
    }
    // a small cluster near a random impact → fine slivers there
    const ia = Math.random() * Math.PI * 2, ir = Math.random() * 0.5;
    const ix = Math.cos(ia) * ir, iy = Math.sin(ia) * ir;
    for (let i = 0; i < 4; i++) {
      seeds.push({ x: ix + (Math.random() - 0.5) * 0.34, y: iy + (Math.random() - 0.5) * 0.34 });
    }

    function intersect(p, q, mx, my, nx, ny) {
      const d1 = (p.x - mx) * nx + (p.y - my) * ny;
      const d2 = (q.x - mx) * nx + (q.y - my) * ny;
      const t = d1 / (d1 - d2);
      return { x: p.x + (q.x - p.x) * t, y: p.y + (q.y - p.y) * t };
    }
    function clip(poly, ax, ay, bx, by) {
      const mx = (ax + bx) / 2, my = (ay + by) / 2, nx = bx - ax, ny = by - ay;
      const inside = p => ((p.x - mx) * nx + (p.y - my) * ny) <= 0;
      const out = [];
      for (let i = 0; i < poly.length; i++) {
        const cur = poly[i], prv = poly[(i + poly.length - 1) % poly.length];
        const ci = inside(cur), pi = inside(prv);
        if (ci) { if (!pi) out.push(intersect(prv, cur, mx, my, nx, ny)); out.push(cur); }
        else if (pi) out.push(intersect(prv, cur, mx, my, nx, ny));
      }
      return out;
    }

    const shards = [];
    for (let i = 0; i < seeds.length; i++) {
      let poly = disc;
      const others = seeds
        .map((s, j) => ({ j, d: (s.x - seeds[i].x) ** 2 + (s.y - seeds[i].y) ** 2 }))
        .filter(o => o.j !== i).sort((a, b) => a.d - b.d).slice(0, 12);
      for (const o of others) {
        poly = clip(poly, seeds[i].x, seeds[i].y, seeds[o.j].x, seeds[o.j].y);
        if (poly.length < 3) break;
      }
      if (poly.length < 3) continue;
      let cxp = 0, cyp = 0;
      poly.forEach(p => { cxp += p.x; cyp += p.y; });
      cxp /= poly.length; cyp /= poly.length;
      shards.push({ verts: poly.map(p => ({ x: p.x - cxp, y: p.y - cyp })), cx: cxp, cy: cyp });
    }
    return shards;
  }

  // Visual-only burst — shards, dust, shockwave, flash, sound. No scoring,
  // doesn't clear the object (shared by real shatter + the attract demo).
  function burst(o) {
    const feverMul = state.fever ? 1.6 : 1;
    const pal = theme.shards;
    o.shatterShape.forEach((sh, idx) => {
      const dist = Math.hypot(sh.cx, sh.cy) || 1;
      const nx = sh.cx / dist, ny = sh.cy / dist;
      const spd = (190 + Math.random() * 230) * baseScale * 1.5 * feverMul;
      state.shards.push({
        x: cx + sh.cx * o.r, y: cy + sh.cy * o.r,
        vx: nx * spd + (Math.random() - 0.5) * 60,
        vy: ny * spd - 120 - Math.random() * 90,
        rot: 0, vr: (Math.random() - 0.5) * 9,
        verts: sh.verts,
        color: pal[idx % pal.length],
        edge: theme.edge, molten: theme.molten,
        life: SHARD_LIFE, max: SHARD_LIFE,
        scale: o.r,
      });
    });
    for (let i = 0; i < 40; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = (90 + Math.random() * 260) * baseScale;
      state.chips.push({
        x: cx, y: cy,
        vx: Math.cos(a) * s, vy: Math.sin(a) * s - 40,
        life: 0.5 + Math.random() * 0.5, max: 1,
        size: (1.5 + Math.random() * 2.5) * baseScale,
        color: Math.random() < 0.3 ? theme.core : pal[(Math.random() * pal.length) | 0],
      });
    }
    state.rings.push({ r: o.r * 0.4, life: 0.5, max: 0.5 });
    state.flash = 1;
    state.shake = 16 * baseScale * feverMul;
    audio.shatter(1, state.fever);
  }

  // Small crackle as the next branch reveals — keeps the build tactile and
  // signals "you're making progress" without any text.
  function crackle(o, gauge) {
    audio.crackle(gauge);
    const ang = Math.random() * Math.PI * 2;
    for (let i = 0; i < 4; i++) {
      const a = ang + (Math.random() - 0.5);
      const s = (40 + Math.random() * 110) * baseScale;
      state.chips.push({
        x: cx + Math.cos(ang) * o.r * 0.5,
        y: cy + Math.sin(ang) * o.r * 0.5,
        vx: Math.cos(a) * s, vy: Math.sin(a) * s - 20,
        life: 0.3 + Math.random() * 0.3, max: 1,
        size: (1 + Math.random() * 1.8) * baseScale,
        color: theme.molten ? theme.core : theme.edge,
      });
    }
    state.shake = Math.max(state.shake, 2.5 * baseScale + gauge * 5 * baseScale);
  }

  function pick(arr) { return arr[(Math.random() * arr.length) | 0]; }

  function comboMult() {
    return (1 + Math.max(0, state.combo - 1) * 0.5) * (state.fever ? 1.5 : 1);
  }

  function showCard(tradition, verdict, line, tierLabel, kind) {
    // Single eyebrow combines the tradition with the tier — one line, small
    // caps, neutral. The verdict + italic line carry the meaning.
    rdEyebrow.textContent = (tierLabel ? tierLabel + ' · ' : '') + tradition;
    rdVerdict.textContent = verdict;
    rdLine.textContent = line;
    readingEl.classList.remove('rare', 'dire');
    if (kind) readingEl.classList.add(kind);
    readingEl.classList.add('show');
    state.cardRare = kind === 'rare';
  }
  function hideCard() { readingEl.classList.remove('show'); }

  // Release before the brink — the crack pattern IS the omen. The orb freezes
  // and clarifies; a reading is drawn from the tier you dared to reach.
  function lockReading() {
    const o = state.obj;
    if (!o) return;
    const T = tierAt(state.depth, o);
    if (!T) { return; }                       // too shallow — nothing read
    const lore = LORE[themeName];
    const r = pick(lore.tiers[T.key]);
    o.frozen = true;
    state.phase = 'reveal';
    state.revealT = state.elapsed;

    const deep = T.idx >= 1;                  // Vision or better keeps the streak
    const now = state.elapsed;
    if (deep && now - state.lastReadT <= COMBO_WINDOW) state.combo++;
    else state.combo = deep ? 1 : 0;
    state.lastReadT = now;
    if (state.combo > state.peakCombo) state.peakCombo = state.combo;

    const rare = T.key === 'omen';
    state.score += Math.round(T.score * comboMult());
    state.readings++;

    if (state.combo >= FEVER_COMBO && !state.fever) {
      state.fever = true; audio.feverIn(); feverEl.classList.add('show');
    } else if (!deep && state.fever) {
      state.fever = false; feverEl.classList.remove('show');
    }

    state.flash = rare ? 0.7 : 0.4;
    state.bloom = rare ? 1 : 0.55;
    state.rings.push({ r: o.r * 0.5, life: 0.6, max: 0.6 });
    audio.reveal(T.idx, rare);

    showCard(L(lore.name), L(r.v), L(r.l), L(T.label), rare ? 'rare' : '');
    updateHUD();
    if (window.CT_LB) window.CT_LB.submit(state.score, false);
  }

  // Held past the brink — the vision shatters. High variance: a blazing
  // fortune, or nothing at all.
  function shatterGamble() {
    const o = state.obj;
    if (!o) return;
    burst(o);
    state.phase = 'reveal';
    state.revealT = state.elapsed;
    state.obj = null;
    // deeper overshoot tilts slightly toward glory; base ~45% great
    const great = Math.random() < 0.45;
    const r = great ? pick(SHATTER.great) : pick(SHATTER.dire);
    state.readings++;
    if (great) {
      state.score += Math.round(240 * comboMult());
      state.bloom = 1.4;
      audio.reveal(3, true);
    } else {
      state.combo = 0;
      if (state.fever) { state.fever = false; feverEl.classList.remove('show'); }
      audio.reveal(0, false);
    }
    showCard(L(LORE[themeName].name) + L(UI.shatteredOf), L(r.v), L(r.l),
             L(great ? UI.shatteredGlory : UI.shattered), great ? 'rare' : 'dire');
    updateHUD();
    if (window.CT_LB && great) window.CT_LB.submit(state.score, false);
  }

  // Dismiss the card → dissolve the spent orb → a new one forms.
  function dismissReading() {
    if (state.phase !== 'reveal') return;
    hideCard();
    state.phase = 'between';
    state.obj = null;
    state._respawnAt = state.elapsed + 0.55;
  }

  function updateHUD() {
    counterEl.textContent = state.score.toLocaleString('en-US');
    if (state.combo >= 2) {
      comboEl.textContent = L(UI.trueSight) + ' ×' + state.combo;
      comboEl.classList.add('show');
    } else {
      comboEl.classList.remove('show');
    }
  }

  // localise static HUD text once, on boot
  labelEl.textContent = L(UI.fortune);
  hintEl.textContent  = L(UI.hint);
  feverEl.textContent = L(UI.trance);
  const creditsEl = document.getElementById('credits');
  if (creditsEl) creditsEl.textContent = L(UI.credits);

  // ----- Input ---------------------------------------------------------------
  let interacted = false;
  function onDown(e) {
    if (!interacted) {
      interacted = true;
      audio.unlock();
      hintEl.classList.add('hidden');
    }
    if (state.phase === 'reveal') {           // tap to dismiss the card early
      if (state.elapsed - state.revealT > 0.45) dismissReading();
      return;
    }
    if (state.phase !== 'reading' || !state.obj) return;
    state.holding = true;
    audio.chargeStart();
    try { canvas.setPointerCapture(e.pointerId); } catch (_) {}
  }
  function onUp(e) {
    try { canvas.releasePointerCapture(e.pointerId); } catch (_) {}
    if (!state.holding) return;
    state.holding = false;
    audio.chargeEnd();
    if (state.phase === 'reading') lockReading();
  }
  canvas.addEventListener('pointerdown', onDown);
  canvas.addEventListener('pointerup', onUp);
  canvas.addEventListener('pointercancel', onUp);

  // Each new orb picks a random tradition — Tarot, Oracle Bone, or Runes.
  // The UI chrome stays constant (fixed dark + ivory + single gold accent);
  // only the orb's material changes, so the page never feels jittery.
  function pickRandomTheme() {
    const keys = Object.keys(THEMES);
    let next = keys[(Math.random() * keys.length) | 0];
    if (next === themeName && keys.length > 1) {
      next = keys[(keys.indexOf(next) + 1 + (Math.random() * (keys.length - 1) | 0)) % keys.length];
    }
    themeName = next;
    theme = THEMES[next];
    audio.onThemeChange();
  }

  // ----- Audio ---------------------------------------------------------------
  // Breathing ambient pad (rise / hold / fall / silence, looped with random
  // peak — per project rule, no continuous drone) + event SFX: charge tone,
  // strike click, theme-flavoured shatter, combo blast, fever riser.
  const audio = (() => {
    let ac = null, master, ambGain, fxGain;
    let unlocked = false, ambTimer = 0;
    let chargeOsc = null, chargeGain = null;

    function ensure() {
      if (ac) return ac;
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      ac = new AC();
      master = ac.createGain(); master.gain.value = 0.8; master.connect(ac.destination);
      ambGain = ac.createGain(); ambGain.gain.value = 0; ambGain.connect(master);
      fxGain = ac.createGain(); fxGain.gain.value = 1; fxGain.connect(master);
      return ac;
    }
    function unlock() {
      if (unlocked) return;
      if (!ensure()) return;
      if (ac.state !== 'running') ac.resume();
      unlocked = true;
      scheduleAmbient(0.6);
    }
    // One breath: rise 5-8s / hold 8-16s / fall 6-10s / silence 7-16s.
    function scheduleAmbient(delay) {
      if (!unlocked) return;
      ambTimer = setTimeout(() => {
        if (!unlocked) return;
        const t = ac.currentTime;
        const rise = 5 + Math.random() * 3;
        const hold = 8 + Math.random() * 8;
        const fall = 6 + Math.random() * 4;
        const sil  = 7 + Math.random() * 9;
        const peak = 0.10 + Math.random() * 0.06;
        const r = theme.root * 0.5;
        const voices = [r, r * 1.5, r * 2, r * 2.9963];
        const oscs = voices.map((f, i) => {
          const o = ac.createOscillator();
          o.type = i < 2 ? 'sine' : 'triangle';
          o.frequency.value = f * (1 + (Math.random() - 0.5) * 0.004);
          const g = ac.createGain(); g.gain.value = 0;
          const lp = ac.createBiquadFilter(); lp.type = 'lowpass';
          lp.frequency.value = 700 + i * 250;
          o.connect(lp); lp.connect(g); g.connect(ambGain);
          const vp = peak * (1 - i * 0.18);
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(vp, t + rise);
          g.gain.setValueAtTime(vp, t + rise + hold);
          g.gain.linearRampToValueAtTime(0, t + rise + hold + fall);
          o.start(t); o.stop(t + rise + hold + fall + 0.1);
          return o;
        });
        ambGain.gain.setValueAtTime(1, t);
        scheduleAmbient((rise + hold + fall + sil) * 1000);
      }, delay * 1000);
    }
    function onThemeChange() { /* next breath picks up new root automatically */ }

    function chargeStart() {
      if (!unlocked) return;
      stopCharge();
      const t = ac.currentTime;
      chargeOsc = ac.createOscillator(); chargeOsc.type = 'sawtooth';
      chargeOsc.frequency.setValueAtTime(theme.root * 0.5, t);
      const lp = ac.createBiquadFilter(); lp.type = 'lowpass';
      lp.frequency.setValueAtTime(300, t);
      lp.frequency.linearRampToValueAtTime(2400, t + CHARGE_TIME);
      chargeGain = ac.createGain(); chargeGain.gain.setValueAtTime(0.0001, t);
      chargeGain.gain.linearRampToValueAtTime(0.16, t + CHARGE_TIME * 0.9);
      chargeOsc.connect(lp); lp.connect(chargeGain); chargeGain.connect(fxGain);
      chargeOsc.start(t);
    }
    function setChargeFreq(c) {
      if (!chargeOsc || !ac) return;
      const f = theme.root * 0.5 * (1 + c * 2.4);
      chargeOsc.frequency.setTargetAtTime(f, ac.currentTime, 0.05);
    }
    function stopCharge() {
      if (!chargeOsc) return;
      const t = ac.currentTime;
      try {
        chargeGain.gain.cancelScheduledValues(t);
        chargeGain.gain.setValueAtTime(chargeGain.gain.value, t);
        chargeGain.gain.exponentialRampToValueAtTime(0.0001, t + 0.08);
        chargeOsc.stop(t + 0.1);
      } catch (_) {}
      chargeOsc = null; chargeGain = null;
    }
    function chargeEnd() { stopCharge(); }

    function noise(t, dur, type, freq, q, vel, dest) {
      const len = Math.max(1, Math.floor(ac.sampleRate * dur));
      const buf = ac.createBuffer(1, len, ac.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = (Math.random() - 0.5) * 2 * (1 - i / len);
      const ns = ac.createBufferSource(); ns.buffer = buf;
      const f = ac.createBiquadFilter(); f.type = type; f.frequency.value = freq; if (q) f.Q.value = q;
      const g = ac.createGain();
      g.gain.setValueAtTime(vel, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      ns.connect(f); f.connect(g); g.connect(dest || fxGain);
      ns.start(t);
    }

    // crackle: a short dry tick as a new fissure opens; pitch climbs with the
    // gauge so the build audibly tightens toward the break.
    function crackle(gauge) {
      if (!unlocked) return;
      const t = ac.currentTime;
      noise(t, 0.035, 'bandpass', 1400 + gauge * 3200, 2.2, 0.06 + gauge * 0.07);
      const o = ac.createOscillator(); o.type = 'triangle';
      const f = (theme.root * 0.5) * (1 + gauge * 2.2);
      o.frequency.setValueAtTime(f, t);
      o.frequency.exponentialRampToValueAtTime(f * 0.6, t + 0.07);
      const g = ac.createGain();
      g.gain.setValueAtTime(0.05 + gauge * 0.05, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.09);
      o.connect(g); g.connect(fxGain);
      o.start(t); o.stop(t + 0.1);
    }

    // theme-flavoured shatter: crystal = bright pings, ceramic = mid clacks,
    // rock = low rumble + grit. Intensity scales shard count + tail.
    function shatter(energy, fever) {
      if (!unlocked) return;
      const t = ac.currentTime;
      const flavour = theme.sfx;
      const inten = 0.7 + energy + (fever ? 0.5 : 0);
      const shards = 6 + Math.floor(inten * 7);
      const band = flavour === 'glass' ? [2600, 7400]
                 : flavour === 'clay'  ? [900, 2400]
                 : [320, 1200];
      for (let i = 0; i < shards; i++) {
        const dl = Math.random() * 0.14;
        const bf = band[0] + Math.random() * (band[1] - band[0]);
        const o = ac.createOscillator();
        o.type = flavour === 'glass' ? (i % 2 ? 'sine' : 'triangle')
               : flavour === 'clay'  ? 'triangle' : 'square';
        o.frequency.setValueAtTime(bf, t + dl);
        o.frequency.exponentialRampToValueAtTime(bf * 0.4, t + dl + (flavour === 'rock' ? 0.3 : 0.16));
        const g = ac.createGain();
        const pk = (0.04 + Math.random() * 0.035) * inten;
        g.gain.setValueAtTime(0, t + dl);
        g.gain.linearRampToValueAtTime(pk, t + dl + 0.003);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dl + (flavour === 'rock' ? 0.34 : 0.2));
        o.connect(g); g.connect(fxGain);
        o.start(t + dl); o.stop(t + dl + 0.4);
      }
      // crunch sweep
      const sweepF = flavour === 'glass' ? 'highpass' : 'bandpass';
      noise(t, flavour === 'rock' ? 0.32 : 0.2, sweepF,
            flavour === 'glass' ? 3200 : flavour === 'clay' ? 1400 : 500,
            1.2, 0.1 * inten);
      // low body thump on break
      const o = ac.createOscillator(); o.type = 'sine';
      o.frequency.setValueAtTime(130, t);
      o.frequency.exponentialRampToValueAtTime(42, t + 0.22);
      const g = ac.createGain();
      g.gain.setValueAtTime(0.16 * inten, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.26);
      o.connect(g); g.connect(fxGain);
      o.start(t); o.stop(t + 0.3);
    }

    // reveal: a struck singing-bowl chord when a reading locks. Deeper tier =
    // fuller, longer chord; rare adds a high shimmering overtone.
    function reveal(tierIdx, rare) {
      if (!unlocked) return;
      const t = ac.currentTime;
      const base = theme.root * 0.75;
      const ratios = [[1, 1.5], [1, 1.5, 2], [1, 1.5, 2, 3], [1, 1.25, 1.5, 2, 3]][Math.min(tierIdx, 4)];
      const dur = 1.0 + tierIdx * 0.5;
      ratios.forEach((rt, i) => {
        const o = ac.createOscillator(); o.type = i === 0 ? 'sine' : 'triangle';
        o.frequency.value = base * rt;
        const g = ac.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.12 - i * 0.018, t + 0.015);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        o.connect(g); g.connect(fxGain);
        o.start(t); o.stop(t + dur + 0.1);
      });
      if (rare) {
        const o = ac.createOscillator(); o.type = 'sine';
        o.frequency.setValueAtTime(base * 4, t);
        o.frequency.linearRampToValueAtTime(base * 6, t + dur * 0.8);
        const g = ac.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.05, t + 0.05);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        o.connect(g); g.connect(fxGain);
        o.start(t); o.stop(t + dur + 0.1);
      }
    }

    function feverIn() {
      if (!unlocked) return;
      const t = ac.currentTime;
      const o = ac.createOscillator(); o.type = 'sine';
      o.frequency.setValueAtTime(160, t);
      o.frequency.exponentialRampToValueAtTime(2000, t + 0.5);
      const g = ac.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.2, t + 0.03);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.6);
      o.connect(g); g.connect(fxGain);
      o.start(t); o.stop(t + 0.65);
    }

    return { unlock, chargeStart, chargeEnd, setChargeFreq, crackle, shatter,
             reveal, feverIn, onThemeChange };
  })();

  // ----- Demo (loops until first touch; preload-safe, RAF-bounded) -----------
  // Aigram preloads games, so a single-shot intro would be over before the
  // player lands here. Loop a ghost press→release on the idle object.
  // Attract loop: a ghost finger presses & holds, the ring fills, cracks
  // spider out, the orb bursts — the whole mechanic, on repeat, no scoring.
  const demo = { active: true, charge: 0 };
  function updateDemo(dt) {
    if (interacted) { demo.active = false; return; }
    if (state.phase !== 'reading' || !state.obj) { demo.charge = 0; return; }
    const o = state.obj;
    const prev = state.depth;
    state.depth += dt * DEPTH_RATE * o.fillMul * curveMul(o.curve, state.depth);
    const releasePoint = o.tiers.revelation + (o.tiers.omen - o.tiers.revelation) * 0.4;
    demo.charge = Math.min(1, state.depth / releasePoint);
    for (const cr of o.cracks) {
      if (cr.revealAt > prev && cr.revealAt <= state.depth) { crackle(o, state.depth); break; }
    }
    if (state.depth >= releasePoint) {                // "release" mid-Revelation
      const lore = LORE[themeName];
      const r = pick(lore.tiers.revelation);
      o.frozen = true;
      state.phase = 'reveal';
      state.revealT = state.elapsed;
      state.flash = 0.4; state.bloom = 0.6;
      state.rings.push({ r: o.r * 0.5, life: 0.6, max: 0.6 });
      audio.reveal(2, false);
      showCard(L(lore.name), L(r.v), L(r.l), L(TIER_LABELS.revelation), '');
    }
  }

  // Material `touch_app` icon (same glyph Murmuration uses) for the demo hand.
  const TOUCH_PATH = new Path2D('M9 11.24V7.5C9 6.12 10.12 5 11.5 5S14 6.12 14 7.5v3.74c1.21-.81 2-2.18 2-3.74C16 5.01 13.99 3 11.5 3S7 5.01 7 7.5c0 1.56.79 2.93 2 3.74zm9.84 4.63l-4.54-2.26c-.17-.07-.35-.11-.54-.11H13v-6C13 6.67 12.33 6 11.5 6S10 6.67 10 7.5v10.74l-3.43-.72c-.08-.01-.15-.03-.24-.03-.31 0-.59.13-.79.33l-.79.8 4.94 4.94c.27.27.65.44 1.06.44h6.79c.75 0 1.33-.55 1.44-1.28l.75-5.27c.01-.07.02-.14.02-.2 0-.62-.38-1.16-.92-1.38z');

  function drawDemoHand() {
    if (!demo.active || !state.obj || state.phase !== 'reading') return;
    const o = state.obj;
    const press = demo.charge || 0;
    const hx = cx + o.r * 0.55;
    const hy = cy + o.r * 0.55 + (1 - press) * 14 * baseScale;
    ctx.save();
    ctx.globalAlpha = 0.85;
    ctx.translate(hx, hy);
    const s = baseScale * (press > 0 ? 1.5 : 1.7);
    ctx.scale(s, s);
    ctx.translate(-12, -12);
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 6;
    ctx.fill(TOUCH_PATH);
    ctx.restore();
    if (press > 0) {
      ctx.save();
      ctx.globalAlpha = 0.5 * (1 - press);
      ctx.strokeStyle = theme.rim;
      ctx.lineWidth = 2 * baseScale;
      ctx.beginPath();
      ctx.arc(hx, hy - 4 * baseScale, (10 + press * 26) * baseScale, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
  }

  // ----- Render --------------------------------------------------------------
  function drawObject() {
    const o = state.obj;
    if (!o) return;
    const age = Math.min(1, (state.elapsed - o.spawnT) / 0.32);
    const ease = 1 - Math.pow(1 - age, 3);
    const c = Math.min(1, state.depth);              // omen depth 0..1
    const revealing = state.phase === 'reveal';
    const stressed = !revealing && (state.holding || (demo.active && c > 0.01));
    // trembles harder the deeper the omen; the frozen orb is dead still
    const jit = stressed ? (0.35 + c) : 0;
    const jx = (Math.random() - 0.5) * jit * 9 * baseScale;
    const jy = (Math.random() - 0.5) * jit * 9 * baseScale;
    const R = o.r * (0.4 + 0.6 * ease) * (1 + c * 0.05);

    // contact shadow on the ground (world space, doesn't follow charge jitter)
    ctx.save();
    ctx.globalAlpha = 0.5 * ease;
    const sh = ctx.createRadialGradient(cx, cy + R * 1.04, 0, cx, cy + R * 1.04, R * 0.95);
    sh.addColorStop(0, 'rgba(0,0,0,0.55)');
    sh.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = sh;
    ctx.save();
    ctx.translate(cx, cy + R * 1.04);
    ctx.scale(1, 0.26);
    ctx.beginPath(); ctx.arc(0, 0, R * 0.95, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    ctx.restore();

    ctx.save();
    ctx.translate(cx + jx, cy + jy);
    const k = R / o.r;

    // ── body: lit sphere (light from upper-left) ──
    const lx = -R * 0.42, ly = -R * 0.46;
    const body = ctx.createRadialGradient(lx, ly, R * 0.05, 0, 0, R * 1.08);
    body.addColorStop(0, theme.hi);
    body.addColorStop(0.42, theme.objA);
    body.addColorStop(0.82, theme.objB);
    body.addColorStop(1, theme.lo);
    ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI * 2);
    ctx.fillStyle = body;
    ctx.shadowColor = theme.molten ? theme.core : theme.objA;
    ctx.shadowBlur = (6 + c * 26) * baseScale;
    ctx.fill();
    ctx.shadowBlur = 0;

    // clip to body for everything surface-bound
    ctx.save();
    ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI * 2); ctx.clip();

    // ambient occlusion — dark terminator opposite the light
    const ao = ctx.createRadialGradient(R * 0.34, R * 0.4, R * 0.2, R * 0.2, R * 0.28, R * 1.25);
    ao.addColorStop(0, 'rgba(0,0,0,0)');
    ao.addColorStop(1, theme.lo);
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = ao;
    ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;

    drawTexture(o.tex, R);

    // inner glow — deepens with the omen, flares bright when it clarifies
    if (c > 0.02 || revealing) {
      const gl = revealing ? 1 : c;
      const cg = ctx.createRadialGradient(0, 0, 0, 0, 0, R);
      cg.addColorStop(0, theme.core);
      cg.addColorStop(Math.min(0.9, 0.12 + gl * 0.72), 'rgba(0,0,0,0)');
      cg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.globalAlpha = (theme.molten ? 0.55 : 0.4) + gl * 0.55;
      ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI * 2);
      ctx.fillStyle = cg; ctx.fill();
      ctx.globalAlpha = 1;
    }

    // cracks — lit fissures; flare to a full golden network on reveal
    ctx.lineCap = 'butt';
    ctx.lineJoin = 'miter';
    const dmgGlow = revealing ? 1 : c;
    for (const cr of o.cracks) {
      const g = (c - cr.revealAt) / cr.span;
      if (g <= 0) continue;
      const grow = g >= 1 ? 1 : g;
      drawCrack(cr.pts, grow, k, 1, dmgGlow);
      for (const f of cr.fork) {
        const fg = (grow - f.fr) / (1 - f.fr);
        if (fg > 0) drawCrack(f.pts, fg >= 1 ? 1 : fg, k, 0.62, dmgGlow);
      }
    }
    ctx.restore(); // unclip

    // ── specular highlight (sits on top, glassy) ──
    const sx = -R * 0.36, sy = -R * 0.42, sr = R * theme.specR;
    const spec = ctx.createRadialGradient(sx, sy, 0, sx, sy, sr);
    spec.addColorStop(0, theme.spec);
    spec.addColorStop(theme.specSoft ? 0.55 : 0.28, theme.specSoft
      ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.18)');
    spec.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fillStyle = spec; ctx.fill();
    if (!theme.specSoft) {                       // tight glint for glossy materials
      ctx.beginPath();
      ctx.arc(sx - sr * 0.12, sy - sr * 0.12, sr * 0.16, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.fill();
    }

    // rim light on the lit side only
    ctx.beginPath();
    ctx.arc(0, 0, R - baseScale, Math.PI * 1.05, Math.PI * 1.95);
    ctx.strokeStyle = theme.rim;
    ctx.globalAlpha = 0.55;
    ctx.lineWidth = 2 * baseScale;
    ctx.stroke();
    ctx.globalAlpha = 1;

    ctx.restore();
  }

  function hx2rgb(h) {
    return [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)];
  }
  function mix(a, b, t) {
    const A = hx2rgb(a), B = hx2rgb(b);
    return `rgb(${A[0] + (B[0] - A[0]) * t | 0},${A[1] + (B[1] - A[1]) * t | 0},${A[2] + (B[2] - A[2]) * t | 0})`;
  }

  // The omen ring: depth fills it; tier ticks mark Vision / Revelation; the
  // arc from the Brink (0.86) to full is the red danger zone — release inside
  // it for the rarest reading, overshoot and it shatters. This single ring
  // makes the whole risk/reward legible at a glance.
  function drawGauge() {
    const o = state.obj;
    if (!o || state.phase !== 'reading') return;
    const age = Math.min(1, (state.elapsed - o.spawnT) / 0.32);
    const ease = 1 - Math.pow(1 - age, 3);
    const c = Math.min(1, state.depth);
    const R = o.r * (0.4 + 0.6 * ease) * (1 + c * 0.05);
    const rr = R * 1.16;
    const TAU = Math.PI * 2, start = -Math.PI / 2;
    const brink = o.tiers.omen;                  // brink position is per-orb random
    const inBrink = c >= brink;
    const pulse = inBrink ? 0.6 + Math.sin(state.elapsed * 20) * 0.4 : 1;

    // faint full track
    ctx.beginPath();
    ctx.arc(cx, cy, rr, 0, TAU);
    ctx.strokeStyle = theme.rim;
    ctx.globalAlpha = 0.12;
    ctx.lineWidth = 3 * baseScale;
    ctx.stroke();
    ctx.globalAlpha = 1;

    // red danger arc — only revealed once the player crosses Revelation. The
    // brink position varies per orb, so its exact start cannot be memorised.
    if (c >= o.tiers.revelation) {
      ctx.beginPath();
      ctx.arc(cx, cy, rr, start + brink * TAU, start + TAU);
      ctx.strokeStyle = '#ff4a3a';
      ctx.globalAlpha = 0.28 * Math.min(1, (c - o.tiers.revelation) / 0.06);
      ctx.lineWidth = 3 * baseScale;
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // tier ticks. Only the Omen/Brink tick is shown — and only once it is in
    // sight (after Revelation). Vision/Revelation ticks are hidden so the
    // player can't pre-aim at fixed positions.
    if (c >= o.tiers.revelation) {
      const a = start + brink * TAU;
      const r0 = rr - 6 * baseScale, r1 = rr + 6 * baseScale;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * r0, cy + Math.sin(a) * r0);
      ctx.lineTo(cx + Math.cos(a) * r1, cy + Math.sin(a) * r1);
      ctx.strokeStyle = '#ff5a45';
      ctx.globalAlpha = 0.75 * Math.min(1, (c - o.tiers.revelation) / 0.06);
      ctx.lineWidth = 2 * baseScale;
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    if (c <= 0.001) return;
    const col = inBrink ? '#ff5a45' : mix(theme.rim, theme.core, Math.pow(c, 0.7));
    ctx.beginPath();
    ctx.arc(cx, cy, rr, start, start + c * TAU);
    ctx.strokeStyle = col;
    ctx.lineWidth = 5 * baseScale;
    ctx.lineCap = 'round';
    ctx.globalAlpha = pulse;
    ctx.shadowColor = col;
    ctx.shadowBlur = (6 + c * 18) * baseScale;
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;

    // leading head
    const ha = start + c * TAU;
    const hxp = cx + Math.cos(ha) * rr, hyp = cy + Math.sin(ha) * rr;
    ctx.beginPath();
    ctx.arc(hxp, hyp, (4 + c * 3) * baseScale, 0, TAU);
    ctx.fillStyle = '#fff';
    ctx.shadowColor = col;
    ctx.shadowBlur = 14 * baseScale;
    ctx.globalAlpha = pulse;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  function drawTexture(tex, R) {
    if (!tex) return;
    if (tex.kind === 'facet') {
      ctx.lineWidth = 1 * baseScale;
      for (const l of tex.lines) {
        const dx = Math.cos(l.a), dy = Math.sin(l.a);
        const px = -dy * l.off * R, py = dx * l.off * R;
        ctx.beginPath();
        ctx.moveTo(px - dx * R * 1.2, py - dy * R * 1.2);
        ctx.lineTo(px + dx * R * 1.2, py + dy * R * 1.2);
        ctx.strokeStyle = l.bright ? 'rgba(255,255,255,0.16)' : 'rgba(0,0,0,0.22)';
        ctx.stroke();
      }
      for (const s of tex.spark) {
        ctx.globalAlpha = 0.5;
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.beginPath(); ctx.arc(s.x * R, s.y * R, s.r * R, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
      }
    } else if (tex.kind === 'speckle') {
      for (const d of tex.dots) {
        ctx.globalAlpha = d.a;
        ctx.fillStyle = d.d ? '#000' : '#fff';
        ctx.beginPath(); ctx.arc(d.x * R, d.y * R, d.r * R, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;
    } else if (tex.kind === 'mottle') {
      for (const b of tex.blobs) {
        ctx.globalAlpha = b.a;
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(b.x * R, b.y * R, b.r * R, 0, Math.PI * 2); ctx.fill();
      }
      for (const f of tex.flecks) {
        ctx.globalAlpha = f.a;
        ctx.fillStyle = theme.hi;
        ctx.beginPath(); ctx.arc(f.x * R, f.y * R, f.r * R, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
  }

  function trimPts(pts, grow, k) {
    const total = pts.length - 1;
    const shown = total * grow;
    const out = [{ x: pts[0].x * k, y: pts[0].y * k }];
    for (let i = 1; i < pts.length; i++) {
      if (i - 1 >= shown) {
        const f = shown - (i - 1);
        if (f <= 0) break;
        const px = pts[i - 1].x + (pts[i].x - pts[i - 1].x) * f;
        const py = pts[i - 1].y + (pts[i].y - pts[i - 1].y) * f;
        out.push({ x: px * k, y: py * k });
        break;
      }
      out.push({ x: pts[i].x * k, y: pts[i].y * k });
    }
    return out;
  }

  // Build a tapered ribbon polygon along P: wide at the origin, narrowing to
  // a sharp hair-thin tip — reads as a real fracture, not a uniform tube.
  function crackPoly(P, wStart) {
    const n = P.length;
    if (n < 2) return null;
    const L = [], R = [];
    for (let i = 0; i < n; i++) {
      let tx, ty;
      if (i === 0) { tx = P[1].x - P[0].x; ty = P[1].y - P[0].y; }
      else if (i === n - 1) { tx = P[n - 1].x - P[n - 2].x; ty = P[n - 1].y - P[n - 2].y; }
      else { tx = P[i + 1].x - P[i - 1].x; ty = P[i + 1].y - P[i - 1].y; }
      const len = Math.hypot(tx, ty) || 1;
      const nx = -ty / len, ny = tx / len;
      const f = i / (n - 1);
      const w = wStart * Math.pow(1 - f, 0.62) * 0.5 + 0.15;
      L.push({ x: P[i].x + nx * w, y: P[i].y + ny * w });
      R.push({ x: P[i].x - nx * w, y: P[i].y - ny * w });
    }
    return { L, R };
  }

  function drawCrack(pts, grow, k, scale, dmgGlow) {
    const P = trimPts(pts, grow, k);
    if (P.length < 2) return;
    const wStart = 3.2 * scale * baseScale * (0.7 + dmgGlow * 0.6);
    const rb = crackPoly(P, wStart);
    if (!rb) return;
    ctx.beginPath();
    ctx.moveTo(rb.L[0].x, rb.L[0].y);
    for (let i = 1; i < rb.L.length; i++) ctx.lineTo(rb.L[i].x, rb.L[i].y);
    for (let i = rb.R.length - 1; i >= 0; i--) ctx.lineTo(rb.R[i].x, rb.R[i].y);
    ctx.closePath();

    if (theme.molten) {
      ctx.save();
      ctx.shadowColor = theme.core;
      ctx.shadowBlur = (7 + dmgGlow * 12) * baseScale;
      ctx.fillStyle = theme.core;
      ctx.fill();
      ctx.restore();
      ctx.fillStyle = 'rgba(255,243,206,0.72)';   // white-hot center
      ctx.fill();
    } else {
      ctx.fillStyle = theme.groove;               // dark open fracture
      ctx.fill();
      // thin lit lip on the light-facing edge only
      ctx.beginPath();
      ctx.moveTo(rb.L[0].x, rb.L[0].y);
      for (let i = 1; i < rb.L.length; i++) ctx.lineTo(rb.L[i].x, rb.L[i].y);
      ctx.strokeStyle = theme.edge;
      ctx.globalAlpha = 0.45;
      ctx.lineWidth = Math.max(0.6, 0.7 * baseScale);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  function drawShards() {
    for (const s of state.shards) {
      const a = Math.max(0, s.life / s.max);
      ctx.save();
      ctx.globalAlpha = a;
      ctx.translate(s.x, s.y);
      ctx.rotate(s.rot);
      const sc = s.scale;
      ctx.beginPath();
      ctx.moveTo(s.verts[0].x * sc, s.verts[0].y * sc);
      for (let i = 1; i < s.verts.length; i++) ctx.lineTo(s.verts[i].x * sc, s.verts[i].y * sc);
      ctx.closePath();
      ctx.fillStyle = s.color;
      ctx.fill();
      // single-axis facet shading: one lit face, one shaded face
      const g = ctx.createLinearGradient(-sc * 0.45, -sc * 0.5, sc * 0.4, sc * 0.55);
      g.addColorStop(0, 'rgba(255,255,255,0.16)');
      g.addColorStop(0.42, 'rgba(255,255,255,0)');
      g.addColorStop(1, 'rgba(0,0,0,0.42)');
      ctx.fillStyle = g;
      ctx.fill();
      // thin lit edge — just enough to separate fragments, no white halo
      ctx.strokeStyle = s.edge;
      ctx.lineWidth = 0.75 * baseScale;
      ctx.globalAlpha = a * (s.molten ? 0.9 : 0.4);
      if (s.molten) { ctx.shadowColor = s.edge; ctx.shadowBlur = 7 * baseScale; }
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  function drawChips() {
    for (const p of state.chips) {
      ctx.globalAlpha = Math.max(0, p.life / p.max);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawRings() {
    for (const r of state.rings) {
      ctx.globalAlpha = Math.max(0, r.life / r.max) * 0.6;
      ctx.strokeStyle = theme.core;
      ctx.lineWidth = 3 * baseScale;
      ctx.beginPath();
      ctx.arc(cx, cy, r.r, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // ----- Simulate ------------------------------------------------------------
  function simulate(dt) {
    state.elapsed += dt;

    if (demo.active) updateDemo(dt);

    // Hold drives the omen deeper: cracks spider out, the ring fills toward the
    // brink. Release = read it; hold past 1.0 = it shatters (the gamble).
    const o = state.obj;
    if (o && state.holding && state.phase === 'reading') {
      const prev = state.depth;
      state.depth += dt * DEPTH_RATE * o.fillMul * curveMul(o.curve, state.depth);
      const d = state.depth;
      audio.setChargeFreq(Math.min(1, d));
      // crackle each time a new branch opens
      for (const cr of o.cracks) {
        if (cr.revealAt > prev && cr.revealAt <= d) { crackle(o, Math.min(1, d)); break; }
      }
      // tier-up cue
      const pT = tierAt(prev, o), nT = tierAt(d, o);
      if (nT && (!pT || nT.key !== pT.key)) {
        state.flash = Math.max(state.flash, nT.key === 'omen' ? 0.45 : 0.22);
        state.rings.push({ r: o.r * 0.6, life: 0.45, max: 0.45 });
        audio.crackle(Math.min(1, d));
      }
      if (d >= 1) shatterGamble();
    }

    // auto-dismiss the card after a beat
    if (state.phase === 'reveal' &&
        state.elapsed - state.revealT > (state.cardRare ? 3.6 : 2.9)) {
      dismissReading();
    }

    if (!state.obj && state._respawnAt != null && state.elapsed >= state._respawnAt) {
      spawnObject(state.elapsed);
      state._respawnAt = null;
    }

    for (let i = state.shards.length - 1; i >= 0; i--) {
      const s = state.shards[i];
      s.x += s.vx * dt; s.y += s.vy * dt;
      s.vy += 1000 * baseScale * dt;
      s.vx *= 0.992;
      s.rot += s.vr * dt;
      s.life -= dt;
      if (s.life <= 0 || s.y > H + 120) state.shards.splice(i, 1);
    }
    for (let i = state.chips.length - 1; i >= 0; i--) {
      const p = state.chips[i];
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vy += 520 * baseScale * dt;
      p.life -= dt;
      if (p.life <= 0) state.chips.splice(i, 1);
    }
    for (let i = state.rings.length - 1; i >= 0; i--) {
      const r = state.rings[i];
      r.r += 620 * baseScale * dt;
      r.life -= dt;
      if (r.life <= 0) state.rings.splice(i, 1);
    }
    if (state.shake > 0) state.shake = Math.max(0, state.shake - dt * 60 * baseScale);
    if (state.flash > 0) state.flash = Math.max(0, state.flash - dt * 3.2);
    if (state.bloom > 0) state.bloom = Math.max(0, state.bloom - dt * 0.7);
  }

  // ----- Loop ----------------------------------------------------------------
  let lastT = performance.now();
  let running = true;
  function tick(now) {
    if (!running) { lastT = now; requestAnimationFrame(tick); return; }
    const dt = Math.min(0.05, (now - lastT) / 1000);
    lastT = now;
    simulate(dt);

    ctx.fillStyle = theme.bg;
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    if (state.shake > 0) {
      ctx.translate((Math.random() - 0.5) * state.shake, (Math.random() - 0.5) * state.shake);
    }
    drawRings();
    drawObject();
    drawGauge();
    drawShards();
    drawChips();
    drawDemoHand();
    ctx.restore();

    // soft golden bloom from the orb on a reveal — the dopamine glow
    if (state.bloom > 0.01) {
      const b = Math.min(1, state.bloom);
      const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.7);
      bg.addColorStop(0, `rgba(255,225,150,${0.28 * b})`);
      bg.addColorStop(0.5, `rgba(255,200,110,${0.10 * b})`);
      bg.addColorStop(1, 'rgba(255,200,110,0)');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);
    }
    if (state.flash > 0) {
      ctx.globalAlpha = Math.min(0.42, state.flash * 0.5);
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1;
    }
    if (state.fever) {
      ctx.globalAlpha = 0.05 + Math.sin(state.elapsed * 6) * 0.025;
      ctx.fillStyle = '#7d56e8';
      ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1;
    }

    requestAnimationFrame(tick);
  }

  // ----- Boot ----------------------------------------------------------------
  spawnObject(0);
  requestAnimationFrame((t) => { lastT = t; tick(t); });

  document.addEventListener('visibilitychange', () => {
    running = document.visibilityState === 'visible';
    lastT = performance.now();
  });

  // Expose for leaderboard module
  window.CT_GAME = { currentScore: () => state.score, getState: () => state };
})();

// ── Leaderboard Module ─────────────────────────────────────────────────────
(function () {
  'use strict';
  const GAMES_API = 'https://games-api.xinghuan-yin.workers.dev';
  const GAME_ID   = 'crack-tap';

  function toB64(s)   { return btoa(unescape(encodeURIComponent(s))); }
  function fromB64(s) { return decodeURIComponent(escape(atob(s))); }

  const params     = new URLSearchParams(window.location.search);
  const telegramId = params.get('telegram_id') || null;
  const rawOrigin  = params.get('api_origin');
  const apiOrigin  = rawOrigin ? decodeURIComponent(rawOrigin) : null;
  const isInAigram = !!(telegramId && apiOrigin);

  let currentUser = null;
  let lastSubmittedScore = 0;

  function callAigramAPI(url) {
    return new Promise((resolve, reject) => {
      const id = crypto.randomUUID();
      let timer;
      const handler = e => {
        if (e.origin !== apiOrigin) return;
        const msg = typeof e.data === 'string' ? e.data : '';
        if (!msg.startsWith('callAPIResult-')) return;
        try {
          const r = JSON.parse(fromB64(msg.slice('callAPIResult-'.length)));
          if (r.request_id !== id) return;
          window.removeEventListener('message', handler);
          clearTimeout(timer);
          if (r.success) resolve(r.data); else reject(new Error(r.error || 'API error'));
        } catch {}
      };
      window.addEventListener('message', handler);
      window.parent.postMessage(
        'callAPI-' + toB64(JSON.stringify({ url, method: 'GET', data: null, request_id: id, emitter: window.location.origin })),
        apiOrigin
      );
      timer = setTimeout(() => { window.removeEventListener('message', handler); reject(new Error('timeout')); }, 10000);
    });
  }

  if (isInAigram) {
    callAigramAPI(`/note/telegram/user/get/info/by/telegram_id?telegram_id=${telegramId}`)
      .then(r => { currentUser = r.data; }).catch(() => {});
  }

  function submit(score, force) {
    if (!telegramId || !score || score <= 0) return;
    if (!force && score <= lastSubmittedScore) return;
    lastSubmittedScore = score;
    fetch(`${GAMES_API}/score`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        game_id: GAME_ID, telegram_id: telegramId,
        name: (currentUser && currentUser.name) || telegramId,
        avatar_url: (currentUser && currentUser.head_url) || '',
        score,
      }),
    }).catch(() => {});
  }

  async function fetchGlobal() {
    const res = await fetch(`${GAMES_API}/leaderboard?game_id=${GAME_ID}&limit=50`);
    const json = await res.json();
    return (json.leaderboard || []).map(e => Object.assign({}, e, { isMe: e.telegram_id === telegramId }));
  }

  async function fetchFriends() {
    if (!isInAigram) return [];
    const friendIds = new Set([telegramId]);
    try {
      const contacts = await callAigramAPI(`/note/telegram/user/contact/list?telegram_id=${telegramId}`);
      const list = Array.isArray(contacts) ? contacts : (contacts && contacts.data ? contacts.data : []);
      list.forEach(f => { if (f.telegram_id) friendIds.add(String(f.telegram_id)); });
    } catch {}
    try {
      const ids = [...friendIds].join(',');
      const res = await fetch(`${GAMES_API}/leaderboard?game_id=${GAME_ID}&telegram_ids=${encodeURIComponent(ids)}`);
      const json = await res.json();
      return (json.leaderboard || []).map(e => Object.assign({}, e, { isMe: e.telegram_id === telegramId }));
    } catch { return []; }
  }

  function openProfile(tid) {
    if (!apiOrigin || !tid) return;
    try { window.parent.postMessage('AW.PROFILE.OPEN-' + btoa(JSON.stringify({ id: tid })), apiOrigin); } catch {}
  }

  window.CT_LB = { submit, isInAigram };

  function saveOnHide() {
    if (!window.CT_GAME) return;
    submit(window.CT_GAME.currentScore(), false);
  }
  window.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') saveOnHide();
  });
  window.addEventListener('pagehide', saveOnHide);

  const MEDALS = ['🥇','🥈','🥉'];
  const overlay = document.getElementById('lb-overlay');
  const body    = document.getElementById('lb-body');
  const tabs    = document.getElementById('lb-tabs');
  const tabGlobal  = document.getElementById('lb-tab-global');
  const tabFriends = document.getElementById('lb-tab-friends');

  const isZh = (!localStorage.getItem('game_locale') && navigator.language.toLowerCase().startsWith('zh'))
             || localStorage.getItem('game_locale') === 'zh';
  const STR = isZh
    ? { me:'我', empty:'暂无记录,快来第一个上榜!', emptyFriends:'好友还未上榜', failed:'加载失败' }
    : { me:'me', empty:'No records yet. Be the first!', emptyFriends:'No friends on the board yet.', failed:'Load failed' };

  if (isInAigram) tabs.style.display = 'flex';

  let currentTab = 'global';

  function openLB()  { overlay.classList.add('show'); loadTab(currentTab); }
  function closeLB() { overlay.classList.remove('show'); }

  function avatarHTML(url, name, size) {
    const s = size || 38;
    if (url) return `<div class="lb-avatar" style="width:${s}px;height:${s}px"><img src="${url}" alt=""></div>`;
    const initial = (name || '?').charAt(0).toUpperCase();
    return `<div class="lb-avatar" style="width:${s}px;height:${s}px;font-size:${Math.round(s*0.38)}px">${initial}</div>`;
  }

  async function loadTab(tab) {
    body.innerHTML = '<div class="lb-state"><span class="lb-spinner"></span></div>';
    tabGlobal.classList.toggle('active', tab === 'global');
    tabFriends.classList.toggle('active', tab === 'friends');
    try {
      const entries = tab === 'global' ? await fetchGlobal() : await fetchFriends();
      if (entries.length === 0) {
        body.innerHTML = `<div class="lb-state"><span class="lb-state-icon">🎮</span><span class="lb-state-text">${tab === 'friends' ? STR.emptyFriends : STR.empty}</span></div>`;
        return;
      }
      body.innerHTML = entries.map((e, i) => {
        const isTop = i < 3;
        const rank = isTop ? `<span class="lb-medal">${MEDALS[i]}</span>` : `<span class="lb-num">${i+1}</span>`;
        const av = avatarHTML(e.avatar_url, e.name, isTop ? 42 : 36);
        const meTag = e.isMe ? `<span class="lb-me-tag">${STR.me}</span>` : '';
        const clickable = isInAigram ? ' clickable' : '';
        const safeName = String(e.name || '').replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
        return `<div class="lb-row${isTop?' top':''}${e.isMe?' me':''}${clickable}" data-tid="${e.telegram_id}">
          <div class="lb-rank">${rank}</div>
          ${av}
          <div class="lb-info"><span class="lb-name">${safeName}</span>${meTag}</div>
          <span class="lb-score">${Number(e.score).toLocaleString()}</span>
        </div>`;
      }).join('');
      if (isInAigram) {
        body.querySelectorAll('.lb-row.clickable').forEach(row => {
          row.addEventListener('pointerdown', () => openProfile(row.dataset.tid));
        });
      }
    } catch {
      body.innerHTML = `<div class="lb-state"><span class="lb-state-text">${STR.failed}</span></div>`;
    }
  }

  tabGlobal.addEventListener('pointerdown', () => { currentTab='global'; loadTab('global'); });
  tabFriends.addEventListener('pointerdown', () => { currentTab='friends'; loadTab('friends'); });
  document.getElementById('lb-close-btn').addEventListener('pointerdown', closeLB);
  overlay.addEventListener('pointerdown', e => { if (e.target === overlay) closeLB(); });

  function wire(id) {
    const btn = document.getElementById(id);
    if (btn) btn.addEventListener('pointerdown', e => { e.stopPropagation(); openLB(); });
  }
  wire('hudLbBtn');
})();
</script>
</body>
</html>
